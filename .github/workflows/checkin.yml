name: BaiduWP App Checkin

on:
  workflow_dispatch:
  schedule:
    # 10:30 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "30 2 * * *"

permissions:
  contents: read

concurrency:
  group: baiduwp-app-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      BAIDUWP_APP_CONFIG: ${{ secrets.BAIDUWP_APP_CONFIG }}
      BAIDUWP_APP_EMAIL_CONFIG: ${{ secrets.BAIDUWP_APP_EMAIL_CONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secret configuration
        run: |
          if [ -z "$BAIDUWP_APP_CONFIG" ]; then
            echo "Missing secret: set BAIDUWP_APP_CONFIG for App account JSON."
            exit 1
          fi

      - name: Run app checkin
        shell: bash
        run: |
          run_checkin() {
            python -m baiduwp_app_checkin 2>&1 | tee app-checkin-output.log
            return "${PIPESTATUS[0]}"
          }

          set +e
          run_checkin
          status="$?"

          if [ "$status" -ne 0 ] || grep -q "update task repeat" app-checkin-output.log; then
            echo "Detected failed status or update task repeat, retrying once after 30 seconds..."
            sleep 30

            run_checkin
            retry_status="$?"

            if [ "$retry_status" -ne 0 ] || grep -q "update task repeat" app-checkin-output.log; then
              echo "Retry still failed or matched update task repeat."
              exit 1
            fi
          fi
